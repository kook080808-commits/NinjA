<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ninja Jang</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            background: #000;
        }
        
        canvas {
            display: block;
        }
        
        #mainMenu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(10,10,30,0.95) 0%, rgba(20,20,50,0.95) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        #mainMenu h1 {
            font-size: 84px;
            color: #fff;
            text-shadow: 0 0 30px #ff0000, 0 0 50px #ff0000, 0 0 70px #ff0000;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite;
            letter-spacing: 4px;
        }
        
        #mainMenu h2 {
            font-size: 36px;
            color: #ffff00;
            text-shadow: 3px 3px 10px #000;
            margin-bottom: 60px;
        }
        
        @keyframes glow {
            0%, 100% { 
                text-shadow: 0 0 30px #ff0000, 0 0 50px #ff0000, 0 0 70px #ff0000;
                transform: scale(1);
            }
            50% { 
                text-shadow: 0 0 40px #ff0000, 0 0 70px #ff0000, 0 0 100px #ff0000;
                transform: scale(1.05);
            }
        }
        
        .menu-btn {
            font-size: 32px;
            padding: 25px 70px;
            margin: 20px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: #fff;
            border: 4px solid #fff;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            text-shadow: 3px 3px 6px #000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.7);
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .menu-btn:hover {
            background: linear-gradient(135deg, #ff3333, #ff0000);
            transform: scale(1.15) translateY(-5px);
            box-shadow: 0 0 30px #ff0000, 0 0 50px #ff0000;
        }
        
        .menu-info {
            margin-top: 40px;
            color: #aaa;
            font-size: 18px;
            text-align: center;
            line-height: 1.8;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            display: none;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }
        
        .health-bar {
            width: 420px;
        }
        
        .player-name {
            color: #fff;
            font-size: 24px;
            margin-bottom: 12px;
            text-shadow: 3px 3px 6px #000;
            font-weight: bold;
        }
        
        .health-container {
            width: 100%;
            height: 45px;
            background: linear-gradient(180deg, #1a1a1a, #0a0a0a);
            border: 4px solid #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 2px 10px rgba(0,0,0,0.5);
            position: relative;
        }
        
        .health-fill {
            height: 100%;
            transition: width 0.3s;
            background: linear-gradient(90deg, #ff0000, #ff6600, #ffaa00);
            box-shadow: 0 0 10px rgba(255,100,0,0.8);
        }
        
        .health-text {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 45px;
            color: #fff;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 2px 2px 4px #000;
        }
        
        #timer {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 64px;
            color: #fff;
            text-shadow: 4px 4px 8px #000, 0 0 20px #ff0000;
            font-weight: bold;
            display: none;
        }
        
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            padding: 20px 40px;
            border-radius: 15px;
            color: #fff;
            text-align: center;
            border: 3px solid #444;
            display: none;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }
        
        #pauseMenu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        #pauseMenu h2 {
            font-size: 64px;
            color: #ffff00;
            text-shadow: 0 0 20px #ff0000;
            margin-bottom: 50px;
        }
        
        .pause-btn {
            font-size: 28px;
            padding: 20px 60px;
            margin: 15px;
            background: linear-gradient(135deg, #444, #222);
            color: #fff;
            border: 3px solid #666;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .pause-btn:hover {
            background: linear-gradient(135deg, #666, #444);
            transform: scale(1.1);
            border-color: #fff;
        }
        
        .control-row {
            margin: 8px 0;
            font-size: 16px;
        }
        
        .key {
            display: inline-block;
            background: linear-gradient(180deg, #444, #222);
            padding: 5px 12px;
            border-radius: 5px;
            margin: 0 4px;
            border: 2px solid #666;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        
        #round-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 96px;
            color: #ffff00;
            text-shadow: 5px 5px 15px #000, 0 0 30px #ff0000;
            font-weight: bold;
            display: none;
            animation: fadeInOut 2s;
            text-transform: uppercase;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        }
    </style>
</head>
<body>
    <div id="mainMenu">
        <h1>🥷 NINJA JANG 🥷</h1>
        <h2>3D Mortal Kombat Style</h2>
        <button class="menu-btn" onclick="startGame()">⚔️ JANGNI BOSHLASH</button>
        <button class="menu-btn" onclick="showInstructions()">📖 QOIDALAR</button>
        <div class="menu-info">
            <p>🤖 Botga qarshi 3D jang!</p>
            <p>Ninja shahri fonida epic jang!</p>
        </div>
    </div>
    
    <div id="ui">
        <div class="health-bar">
            <div class="player-name">🤍 OQ NINJA (SIZ)</div>
            <div class="health-container">
                <div class="health-fill" id="health1" style="width: 100%"></div>
                <div class="health-text" id="healthText1">100</div>
            </div>
        </div>
        <div class="health-bar" style="text-align: right;">
            <div class="player-name">🖤 QORA NINJA (BOT)</div>
            <div class="health-container">
                <div class="health-fill" id="health2" style="width: 100%"></div>
                <div class="health-text" id="healthText2">100</div>
            </div>
        </div>
    </div>
    
    <div id="timer">99</div>
    <div id="round-display">ROUND 1</div>
    
    <div id="pauseMenu">
        <h2>⏸️ PAUZA</h2>
        <button class="pause-btn" onclick="resumeGame()">▶️ DAVOM ETTIRISH</button>
        <button class="pause-btn" onclick="restartFight()">🔄 JANGNI QAYTA BOSHLASH</button>
        <button class="pause-btn" onclick="backToMenu()">🏠 BOSH SAHIFA</button>
    </div>
    
    <div id="controls">
        <div class="control-row">
            <strong>🎮 BOSHQARUV:</strong>
            <span class="key">W</span> Sakrash
            <span class="key">S</span> Cho'kish
            <span class="key">A/D</span> Harakat
        </div>
        <div class="control-row">
            <span class="key">J</span> Musht (5💥)
            <span class="key">K</span> Tepki (8💥)
            <span class="key">L</span> Zaхvat (27💥)
            <span class="key">U</span> Blok 🛡️
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let player1, player2;
        let ground;
        let gameStarted = false;
        let gameActive = false;
        let gamePaused = false;
        let timer = 99;
        let round = 1;
        let timerCounter = 0;
        const keys = {};
        
        function showInstructions() {
            alert('🥷 NINJA JANG - QOIDALAR 🥷\n\n' +
                  '⌨️ BOSHQARUV:\n' +
                  'W - Sakrash 🦘\n' +
                  'S - Cho\'kish 🙇\n' +
                  'A/D - Chapga/O\'ngga harakat 👈👉\n' +
                  'J - Musht 👊 (5 zarar)\n' +
                  'K - Tepki 🦶 (8 zarar)\n' +
                  'L - Zaхvat 🤜🤛 (27 zarar!)\n' +
                  'U - Blok 🛡️\n\n' +
                  '🎯 MAQSAD:\n' +
                  'Botni mag\'lub eting!\n' +
                  'Zaхvat eng kuchli hujum!\n\n' +
                  '⏰ 99 soniya ichida g\'olib bo\'ling!');
        }

        function startGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
            document.getElementById('timer').style.display = 'block';
            
            gameStarted = true;
            gamePaused = false;
            initThreeJS();
            
            setTimeout(() => {
                document.getElementById('round-display').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('round-display').style.display = 'none';
                    gameActive = true;
                }, 2000);
            }, 500);
        }

        function pauseGame() {
            if (!gameActive || gamePaused) return;
            gamePaused = true;
            gameActive = false;
            document.getElementById('pauseMenu').style.display = 'flex';
        }

        function resumeGame() {
            gamePaused = false;
            gameActive = true;
            document.getElementById('pauseMenu').style.display = 'none';
        }

        function restartFight() {
            gamePaused = false;
            document.getElementById('pauseMenu').style.display = 'none';
            resetRound();
            round--;
        }

        function backToMenu() {
            gamePaused = false;
            gameActive = false;
            gameStarted = false;
            document.getElementById('pauseMenu').style.display = 'none';
            document.getElementById('ui').style.display = 'none';
            document.getElementById('timer').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
            
            if (renderer) {
                document.body.removeChild(renderer.domElement);
                renderer = null;
            }
            scene = null;
            player1 = null;
            player2 = null;
        }

        class Fighter3D {
            constructor(x, z, color, isBot = false) {
                this.color = color;
                this.health = 100;
                this.maxHealth = 100;
                this.isBot = isBot;
                this.velocity = { x: 0, y: 0, z: 0 };
                this.isJumping = false;
                this.isCrouching = false;
                this.isBlocking = false;
                this.isGrabbing = false;
                this.grabTime = 0;
                this.attackCooldown = 0;
                this.hitStun = 0;
                this.botDecisionTimer = 0;
                this.botAction = null;
                
                // Create 3D mesh
                const geometry = new THREE.BoxGeometry(1, 2, 0.5);
                const material = new THREE.MeshPhongMaterial({ 
                    color: color,
                    shininess: 80
                });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.set(x, 1, z);
                this.mesh.castShadow = true;
                this.mesh.receiveShadow = true;
                
                // Head
                const headGeo = new THREE.SphereGeometry(0.4, 16, 16);
                const headMat = new THREE.MeshPhongMaterial({ 
                    color: color,
                    shininess: 80
                });
                this.head = new THREE.Mesh(headGeo, headMat);
                this.head.position.y = 1.4;
                this.head.castShadow = true;
                this.mesh.add(this.head);
                
                // Eyes
                const eyeGeo = new THREE.SphereGeometry(0.1, 8, 8);
                const eyeMat = new THREE.MeshBasicMaterial({ 
                    color: color === 0xffffff ? 0x000000 : 0xff0000 
                });
                const eye1 = new THREE.Mesh(eyeGeo, eyeMat);
                eye1.position.set(-0.15, 1.45, 0.35);
                this.mesh.add(eye1);
                const eye2 = new THREE.Mesh(eyeGeo, eyeMat);
                eye2.position.set(0.15, 1.45, 0.35);
                this.mesh.add(eye2);
                
                // Sword
                const swordGeo = new THREE.BoxGeometry(0.1, 1.5, 0.1);
                const swordMat = new THREE.MeshPhongMaterial({ 
                    color: 0x888888,
                    shininess: 100
                });
                this.sword = new THREE.Mesh(swordGeo, swordMat);
                this.sword.position.set(0.6, 0.5, 0);
                this.sword.rotation.z = Math.PI / 4;
                this.sword.visible = false;
                this.mesh.add(this.sword);
                
                scene.add(this.mesh);
            }

            update(opponent) {
                if (this.isBot) {
                    this.botAI(opponent);
                }

                if (this.hitStun > 0) {
                    this.hitStun--;
                    return;
                }

                if (this.attackCooldown > 0) {
                    this.attackCooldown--;
                    this.sword.visible = this.attackCooldown > 10;
                    this.sword.rotation.z = -Math.PI / 2;
                }

                // Gravity
                this.velocity.y -= 0.02;
                this.mesh.position.y += this.velocity.y;

                if (this.mesh.position.y <= 1) {
                    this.mesh.position.y = 1;
                    this.velocity.y = 0;
                    this.isJumping = false;
                }

                // Movement
                this.velocity.x = 0;
                this.velocity.z = 0;
                this.isCrouching = false;
                this.isBlocking = false;

                if (!this.isGrabbing) {
                    const controls = this.isBot ? 
                        {left:'arrowleft',right:'arrowright',up:'arrowup',down:'arrowdown',
                         punch:'1',kick:'2',grab:'3',block:'0'} :
                        {left:'a',right:'d',up:'w',down:'s',
                         punch:'j',kick:'k',grab:'l',block:'u'};

                    if (keys[controls.left]) this.velocity.x = -0.1;
                    if (keys[controls.right]) this.velocity.x = 0.1;
                    if (keys[controls.up] && !this.isJumping) {
                        this.velocity.y = 0.3;
                        this.isJumping = true;
                    }
                    if (keys[controls.down] && !this.isJumping) {
                        this.isCrouching = true;
                        this.mesh.scale.y = 0.6;
                    } else {
                        this.mesh.scale.y = 1;
                    }
                    if (keys[controls.block]) {
                        this.isBlocking = true;
                    }
                    if (keys[controls.punch] && this.attackCooldown === 0) {
                        this.attack(opponent, 5, 1);
                    }
                    if (keys[controls.kick] && this.attackCooldown === 0) {
                        this.attack(opponent, 8, 1);
                    }
                    if (keys[controls.grab] && this.attackCooldown === 0) {
                        this.grab(opponent);
                    }
                }

                this.mesh.position.x += this.velocity.x;
                this.mesh.position.z += this.velocity.z;

                // Boundaries
                this.mesh.position.x = Math.max(-10, Math.min(10, this.mesh.position.x));

                // Face opponent
                const dx = opponent.mesh.position.x - this.mesh.position.x;
                this.mesh.rotation.y = dx > 0 ? 0 : Math.PI;

                // Grab damage
                if (this.isGrabbing && this.grabTime > 0) {
                    this.grabTime--;
                    if (this.grabTime % 10 === 0) {
                        opponent.takeDamage(3);
                    }
                    if (this.grabTime === 0) {
                        this.isGrabbing = false;
                        opponent.hitStun = 30;
                        const pushDir = (opponent.mesh.position.x - this.mesh.position.x) > 0 ? 1 : -1;
                        opponent.mesh.position.x += pushDir * 3;
                        opponent.velocity.y = 0.2;
                    }
                }

                // Visual effects
                if (this.isBlocking) {
                    this.mesh.material.emissive = new THREE.Color(0x00ff00);
                    this.mesh.material.emissiveIntensity = 0.3;
                } else {
                    this.mesh.material.emissive = new THREE.Color(0x000000);
                }

                if (this.isGrabbing) {
                    this.mesh.material.emissive = new THREE.Color(0xff0000);
                    this.mesh.material.emissiveIntensity = 0.5;
                }
            }

            botAI(opponent) {
                this.botDecisionTimer--;
                
                if (this.botDecisionTimer <= 0) {
                    const dist = Math.abs(this.mesh.position.x - opponent.mesh.position.x);
                    const rand = Math.random();
                    
                    if (dist > 3.5) {
                        this.botAction = 'approach';
                        this.botDecisionTimer = 35;
                    } else if (dist < 1.8) {
                        if (rand < 0.25) this.botAction = 'grab';
                        else if (rand < 0.55) this.botAction = 'punch';
                        else this.botAction = 'kick';
                        this.botDecisionTimer = 50;
                    } else {
                        if (rand < 0.35) this.botAction = 'kick';
                        else if (rand < 0.65) this.botAction = 'approach';
                        else this.botAction = 'block';
                        this.botDecisionTimer = 40;
                    }
                }

                if (opponent.attackCooldown > 0 && Math.random() < 0.5) {
                    this.botAction = 'block';
                }

                const controls = {left:'arrowleft',right:'arrowright',up:'arrowup',
                                 punch:'1',kick:'2',grab:'3',block:'0'};

                Object.keys(controls).forEach(k => keys[controls[k]] = false);

                switch(this.botAction) {
                    case 'approach':
                        if (opponent.mesh.position.x > this.mesh.position.x) keys[controls.right] = true;
                        else keys[controls.left] = true;
                        break;
                    case 'punch':
                        keys[controls.punch] = true;
                        setTimeout(() => keys[controls.punch] = false, 100);
                        break;
                    case 'kick':
                        keys[controls.kick] = true;
                        setTimeout(() => keys[controls.kick] = false, 100);
                        break;
                    case 'grab':
                        keys[controls.grab] = true;
                        setTimeout(() => keys[controls.grab] = false, 100);
                        break;
                    case 'block':
                        keys[controls.block] = true;
                        break;
                }
            }

            attack(opponent, damage, knockback) {
                const dist = Math.abs(this.mesh.position.x - opponent.mesh.position.x);
                if (dist < 2 && !opponent.isBlocking) {
                    opponent.takeDamage(damage);
                    opponent.hitStun = 15;
                    const pushDir = (opponent.mesh.position.x - this.mesh.position.x) > 0 ? 1 : -1;
                    opponent.mesh.position.x += pushDir * knockback;
                    opponent.velocity.y = 0.15;
                } else if (opponent.isBlocking) {
                    opponent.takeDamage(damage * 0.2);
                }
                this.attackCooldown = 20;
            }

            grab(opponent) {
                const dist = Math.abs(this.mesh.position.x - opponent.mesh.position.x);
                if (dist < 1.8 && !opponent.isBlocking && !opponent.isGrabbing) {
                    this.isGrabbing = true;
                    this.grabTime = 90;
                    opponent.hitStun = 90;
                }
            }

            takeDamage(amount) {
                if (!this.isBlocking) {
                    this.health = Math.max(0, this.health - amount);
                }
            }
        }

        function initThreeJS() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x1a3a52, 10, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 12);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Background with ninja city
            const bgTexture = new THREE.TextureLoader().load(
                'data:image/svg+xml;base64,' + btoa(`<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1000" viewBox="0 0 2000 1000">
                    <defs>
                        <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#0a1a2a;stop-opacity:1" />
                            <stop offset="50%" style="stop-color:#1a3a52;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#0a1a2a;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect width="2000" height="1000" fill="url(#sky)"/>
                    <g opacity="0.4">
                        <polygon points="100,400 200,300 250,350 220,500" fill="#0d2535"/>
                        <polygon points="300,350 400,250 450,300 420,480" fill="#0a1f30"/>
                        <polygon points="500,380 600,280 650,330 620,500" fill="#0d2535"/>
                        <polygon points="700,360 800,260 850,310 820,490" fill="#0a1f30"/>
                        <polygon points="900,390 1000,290 1050,340 1020,500" fill="#0d2535"/>
                        <polygon points="1100,370 1200,270 1250,320 1220,495" fill="#0a1f30"/>
                        <polygon points="1300,385 1400,285 1450,335 1420,500" fill="#0d2535"/>
                        <polygon points="1500,365 1600,265 1650,315 1620,492" fill="#0a1f30"/>
                        <polygon points="1700,395 1800,295 1850,345 1820,500" fill="#0d2535"/>
                    </g>
                    <g opacity="0.3">
                        <rect x="150" y="420" width="8" height="15" fill="#ff6600"/>
                        <rect x="380" y="380" width="8" height="15" fill="#ff6600"/>
                        <rect x="580" y="410" width="8" height="15" fill="#ff6600"/>
                        <rect x="780" y="390" width="8" height="15" fill="#ff6600"/>
                        <rect x="980" y="415" width="8" height="15" fill="#ff6600"/>
                        <rect x="1180" y="395" width="8" height="15" fill="#ff6600"/>
                        <rect x="1380" y="408" width="8" height="15" fill="#ff6600"/>
                        <rect x="1580" y="388" width="8" height="15" fill="#ff6600"/>
                        <rect x="1780" y="418" width="8" height="15" fill="#ff6600"/>
                    </g>
                </svg>`)
            );
            scene.background = bgTexture;

            // Lights
            const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.camera.left = -20;
            dirLight.shadow.camera.right = 20;
            dirLight.shadow.camera.top = 20;
            dirLight.shadow.camera.bottom = -20;
            scene.add(dirLight);

            const pointLight = new THREE.PointLight(0xff6600, 1, 50);
            pointLight.position.set(0, 5, 0);
            scene.add(pointLight);

            // Ground
            const groundGeo = new THREE.BoxGeometry(25, 0.5, 10);
            const groundMat = new THREE.MeshPhongMaterial({ 
                color: 0x2a2a2a,
                shininess: 60
            });
            ground = new THREE.Mesh(groundGeo, groundMat);
            ground.position.y = -0.25;
            ground.receiveShadow = true;
            scene.add(ground);

            // Grid
            const gridHelper = new THREE.GridHelper(25, 25, 0x444444, 0x222222);
            scene.add(gridHelper);

            // Create fighters
            player1 = new Fighter3D(-5, 0, 0xffffff, false);
            player2 = new Fighter3D(5, 0, 0x222222, true);

            animate();
        }

        function animate() {
            if (!gameStarted) return;
            requestAnimationFrame(animate);

            if (gameActive) {
                player1.update(player2);
                player2.update(player1);

                timerCounter++;
                if (timerCounter >= 60) {
                    timer--;
                    timerCounter = 0;
                }

                checkWin();
            }

            updateUI();
            renderer.render(scene, camera);
        }

        function updateUI() {
            const h1 = (player1.health / player1.maxHealth) * 100;
            const h2 = (player2.health / player2.maxHealth) * 100;
            
            document.getElementById('health1').style.width = h1 + '%';
            document.getElementById('health2').style.width = h2 + '%';
            document.getElementById('healthText1').textContent = Math.ceil(player1.health);
            document.getElementById('healthText2').textContent = Math.ceil(player2.health);
            document.getElementById('timer').textContent = timer;
        }

        function checkWin() {
            if (player1.health <= 0 || player2.health <= 0 || timer <= 0) {
                gameActive = false;
                let winner = player1.health > player2.health ? '🏆 SIZ G\'OLIBSIZ! 🏆' : '💀 BOT G\'OLIB BO\'LDI! 💀';
                if (player1.health === player2.health) winner = '🤝 DURANG! 🤝';
                
                const display = document.getElementById('round-display');
                display.textContent = winner;
                display.style.display = 'block';
                
                setTimeout(() => {
                    display.style.display = 'none';
                    resetRound();
                }, 3000);
            }
        }

        function resetRound() {
            player1.health = 100;
            player2.health = 100;
            player1.mesh.position.set(-5, 1, 0);
            player2.mesh.position.set(5, 1, 0);
            timer = 99;
            round++;
            gameActive = true;
            
            const display = document.getElementById('round-display');
            display.textContent = 'ROUND ' + round;
            display.style.display = 'block';
            setTimeout(() => display.style.display = 'none', 2000);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'escape') {
                if (!gamePaused && gameActive) {
                    pauseGame();
                }
                return;
            }
            keys[e.key.toLowerCase()] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        window.addEventListener('resize', () => {
            if (gameStarted) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
